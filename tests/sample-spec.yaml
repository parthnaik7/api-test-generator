openapi: "3.0.3"
info:
  title: Sample E-Commerce API
  description: A sample API for demonstrating API TestGen capabilities.
  version: "1.0.0"

servers:
  - url: https://api.example.com/v1

security:
  - bearerAuth: []

tags:
  - name: users
    description: User management
  - name: products
    description: Product catalog
  - name: orders
    description: Order processing

paths:
  /users:
    get:
      tags: [users]
      operationId: listUsers
      summary: List all users
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: role
          in: query
          required: false
          schema:
            type: string
            enum: [admin, user, guest]
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
      responses:
        "200":
          description: List of users
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

    post:
      tags: [users]
      operationId: createUser
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - firstName
                - lastName
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
                  maxLength: 128
                firstName:
                  type: string
                  minLength: 1
                  maxLength: 50
                lastName:
                  type: string
                  minLength: 1
                  maxLength: 50
                age:
                  type: integer
                  minimum: 18
                  maximum: 120
                role:
                  type: string
                  enum: [admin, user, guest]
                  default: user
                phoneNumber:
                  type: string
                  pattern: '^\\+?[0-9\\-\\s()]+$'
      responses:
        "201":
          description: User created
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "409":
          description: Email already exists
        "422":
          description: Unprocessable Entity

  /users/{userId}:
    get:
      tags: [users]
      operationId: getUserById
      summary: Get a user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User found
        "401":
          description: Unauthorized
        "404":
          description: Not found

    put:
      tags: [users]
      operationId: updateUser
      summary: Update a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                  minLength: 1
                  maxLength: 50
                lastName:
                  type: string
                  minLength: 1
                  maxLength: 50
                age:
                  type: integer
                  minimum: 18
                  maximum: 120
      responses:
        "200":
          description: Updated
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Not found

    delete:
      tags: [users]
      operationId: deleteUser
      summary: Delete a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /products:
    get:
      tags: [products]
      operationId: listProducts
      summary: List products
      security: []  # Public endpoint
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
            minimum: 0
        - name: maxPrice
          in: query
          schema:
            type: number
            minimum: 0
        - name: inStock
          in: query
          schema:
            type: boolean
        - name: sort
          in: query
          schema:
            type: string
            enum: [price_asc, price_desc, name_asc, name_desc, newest]
      responses:
        "200":
          description: Product list

    post:
      tags: [products]
      operationId: createProduct
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        "201":
          description: Created
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "422":
          description: Validation error

  /orders:
    post:
      tags: [orders]
      operationId: createOrder
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - items
              properties:
                userId:
                  type: string
                  format: uuid
                items:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items:
                    type: object
                    required:
                      - productId
                      - quantity
                    properties:
                      productId:
                        type: string
                        format: uuid
                      quantity:
                        type: integer
                        minimum: 1
                        maximum: 999
                couponCode:
                  type: string
                  maxLength: 20
                notes:
                  type: string
                  maxLength: 500
      responses:
        "201":
          description: Order placed
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "422":
          description: Validation error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ProductRequest:
      type: object
      required:
        - name
        - price
        - sku
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        price:
          type: number
          minimum: 0.01
          maximum: 999999.99
        sku:
          type: string
          pattern: '^[A-Z0-9\\-]+$'
          minLength: 3
          maxLength: 50
        stock:
          type: integer
          minimum: 0
          maximum: 999999
        category:
          type: string
          enum: [electronics, clothing, food, books, toys, other]
        isActive:
          type: boolean
          default: true
